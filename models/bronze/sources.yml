version: 2

# Defines external data sources used by dbt
sources:

  # Logical name used inside {{ source() }}
  - name: bronze_external

    # Snowflake database containing the external tables
    database: CT_HARSHAVARDHAN_K_DB

    # Snowflake schema where the external tables are stored
    schema: BRONZE_23618

    # Configuration for this source
    config:

      # Configure source freshness checks
      freshness:

        # Warn if the source data is older than the specified time
        warn_after:

          # Maximum age before warning
          count: 24

          # Time unit for the above count
          period: hour

    # List of external tables under this source
    tables:

      - name: EXT_CUSTOMER_DATA
        description: "External table containing raw customer JSON data."

      - name: EXT_ORDERS_DATA
        description: "External table containing raw order JSON data."

      - name: EXT_PRODUCT_DATA
        description: "External table containing raw product JSON data."

      - name: EXT_STORE_DATA
        description: "External table containing raw store JSON data."

      - name: EXT_SUPPLIER_DATA
        description: "External table containing raw supplier JSON data."

      - name: EXT_EMPLOYEE_DATA
        description: "External table containing raw employee JSON data."

      - name: EXT_CAMPAIGN_DATA
        description: "External table containing raw campaign JSON data."