version: 2

models:
  - name: fact_sales
    description: Sales Fact Table

    columns:

      - name: sales_key
        tests:
          - unique
          - not_null

      - name: order_id
        tests:
          - not_null

      - name: customer_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_customer')
              field: customer_key

      - name: product_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_product')
              field: product_key

      - name: store_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_store')
              field: store_key

      - name: employee_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_employee')
              field: employee_key

      - name: date_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key

      - name: quantity_sold
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: unit_price
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: total_sales_amount
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: cost_amount
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: discount_amount
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: shipping_cost
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"

      - name: profit_amount
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: "<= total_sales_amount"


      - name: customer_segment_impact
        tests:
          - accepted_values:
              values:
                - Young
                - Middle-aged
                - Senior
                - Unknown