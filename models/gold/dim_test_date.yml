version: 2

models:
  - name: dim_date
    description: Date Dimension

    columns:

      - name: date_key
        tests:
          - unique
          - not_null

      - name: full_date
        tests:
          - unique
          - not_null

      - name: year
        tests:
          - not_null

      - name: quarter
        tests:
          - not_null

      - name: month
        tests:
          - not_null

      - name: holiday_flag
        tests:
          - not_null