version: 2

models:
  - name: dim_customer
    description: Customer Dimension

    columns:

      - name: customer_key
        tests:
          - unique
          - not_null

      - name: customer_id
        tests:
          - unique
          - not_null

      - name: full_name
        tests:
          - not_null

      - name: email
        tests:
          - not_null

      - name: customer_segment
        tests:
          - not_null
          - accepted_values:
              values:
                - Young
                - Middle-aged
                - Senior
                - Unknown

      - name: is_current
        tests:
          - not_null