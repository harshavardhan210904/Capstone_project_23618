version: 2

models:
  - name: dim_employee
    description: Employee Dimension

    columns:

      - name: employee_key
        tests:
          - unique
          - not_null

      - name: employee_id
        tests:
          - unique
          - not_null

      - name: full_name
        tests:
          - not_null

      - name: role
        tests:
          - not_null

      - name: performance_rating
        tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= 0"