# Name your project! Project names should contain only lowercase characters
# and underscores. A good package name should reflect your organization's
# name or the intended use of these models
name: 'capstone_project_23618'
version: '1.0.0'
config-version: 2

# This setting configures which "profile" dbt uses for this project.
profile: 'default'

# These configurations specify where dbt should look for different types of files.
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Elementary observability config
vars:
  elementary:
    elementary_schema: elementary
    target_schema: elementary

on-run-end:
  - "{{ elementary.upload_dbt_artifacts() }}"

# Configuring models
models:
  capstone_project_23618:

    bronze:
      +schema: "{{ 'BRONZE_PROD_23618' if target.name == 'prod' else 'BRONZE_23618' }}"
      +materialized: incremental
      +incremental_strategy: merge
      +unique_key: _source_file
      +on_schema_change: sync_all_columns

    silver:
      +schema: "{{ 'SILVER_PROD_23618' if target.name == 'prod' else 'SILVER_23618' }}"

    gold:
      +schema: "{{ 'GOLD_PROD_23618' if target.name == 'prod' else 'GOLD_23618' }}"

    reporting_views:
      +schema: "{{ 'REPORTING_PROD_23618' if target.name == 'prod' else 'REPORTING_VIEWS' }}"
      +materialized: view

  elementary:
    +schema: elementary